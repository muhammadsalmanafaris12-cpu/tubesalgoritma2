<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BRACKTIX - Gerbang Masuk</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="gateway-container">
        <div class="gateway-graphic-side">
            <div class="gateway-graphic-content">
                <h1 class="gateway-graphic-title">BRACKTIX</h1>
                <p class="gateway-graphic-description">
                    Aplikasi Web Manajemen Turnamen Esports.
                    Kelola bagan pertandingan, tim, dan jadwal secara mudah.
                </p>
                </div>
        </div>

        <div class="gateway-form-side">
<div class="gateway-form-card">
                

                <div class="gateway-form-header">
                    <h2>MASUK</h2>
                    <p>Masukkan username dan password untuk mengakses BRACKTIX</p>
                </div>
                
                <div th:if="${param.registered}" class="text-success text-center mb-3" style="font-size: 0.9rem;">
                    Registrasi sukses! Silakan login.
                </div>
                
                <div th:if="${error}" class="text-danger text-center mb-3" style="font-size: 0.9rem;">
                    <i class="fa-solid fa-triangle-exclamation"></i> <span th:text="${error}"></span>
                </div>

                <form th:action="@{/login}" method="POST">
                    <div class="form-group">
                        <label for="username">Username</label>
                        <div style="position: relative;">
                            <i class="fa-solid fa-user" style="position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--text-muted);"></i>
                            <input type="text" id="username" name="username" class="form-control" style="padding-left: 2.5rem;" placeholder="Username" required>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label for="password">Password</label>
                        <div style="position: relative;">
                            <i class="fa-solid fa-lock" style="position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--text-muted);"></i>
                            <input type="password" id="password" name="password" class="form-control" style="padding-left: 2.5rem;" placeholder="Password" required>
                        </div>
                    </div>
                    
                    <button type="submit" class="btn btn-primary w-100 mt-3">
                        Masuk <i class="fa-solid fa-right-to-bracket"></i>
                    </button>
                </form>

                <div class="gateway-form-link">
                    Belum punya akun? <a th:href="@{/register}">Buat Akun Baru</a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
