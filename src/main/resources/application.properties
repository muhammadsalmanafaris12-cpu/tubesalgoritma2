spring.application.name=demo

# ==============================
# Show full error detail for debugging (disable in production)
# ==============================
server.error.include-message=always
server.error.include-exception=true
server.error.include-stacktrace=always
server.error.include-binding-errors=always


# ==============================
# Database Configuration (MySQL - phpMyAdmin)
# ==============================
spring.datasource.url=jdbc:mysql://localhost:3306/db_bracktix?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Jakarta
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=

# Dialect otomatis dideteksi oleh Hibernate 7 (Spring Boot 4.x)

# Auto create/update tables on every startup (long-term persistence)
spring.jpa.hibernate.ddl-auto=update

# Show SQL queries in console (optional, can be set to false in production)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Thymeleaf configuration for development
spring.thymeleaf.cache=false
